<html th:replace="~{layouts/base :: layout('企業マスタ登録／変更', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
    <div class="w-1/2 mt-2 my-6">
        <h2 class="text-xl pb-3 flex items-center"><i class="fas fa-list mr-3"></i>企業情報</h2>

        <form th:action="@{/supplier/entry}" method="post" th:object="${company}"
              class="p-10 bg-white rounded-2xl shadow-xl">

            <input type="hidden" th:field="*{id}">

            <!-- Error message for duplicate code -->
            <div th:if="${errorMessage}"
                 style="background:#fee2e2; border:1px solid #fca5a5; color:#991b1b; padding:12px 20px; border-radius:8px; margin-bottom:16px; font-weight:bold;">
                ⚠️ <span th:text="${errorMessage}"></span>
            </div>

            <!-- 企業コード -->
            <div class="mt-2">
                <label class="mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">
                    企業コード <span style="color:red">*</span>
                </label>
                <input type="text" name="companyCode" th:value="*{companyCode}"
                       th:readonly="${company.id != null}"
                       th:classappend="${company.id != null} ? 'bg-gray-100 cursor-not-allowed text-gray-500' : ''"
                       placeholder="企業コードをご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                <p th:if="${#fields.hasErrors('companyCode')}"
                   th:errors="*{companyCode}"
                   style="color:red; font-size:0.75rem; margin-left:0.75rem; margin-top:0.25rem;"></p>
            </div>

            <!-- 企業名 -->
            <div class="mt-4">
                <label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">
                    企業名 <span style="color:red">*</span>
                </label>
                <input type="text" name="companyName" th:value="*{companyName}"
                       placeholder="企業名をご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                <p th:if="${#fields.hasErrors('companyName')}"
                   th:errors="*{companyName}"
                   style="color:red; font-size:0.75rem; margin-left:0.75rem; margin-top:0.25rem;"></p>
            </div>

            <!-- TEL -->
            <div class="mt-4">
                <label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">TEL</label>
                <input type="text" name="tel" th:value="*{tel}"
                       placeholder="電話番号をご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                       
                 <p th:if="${#fields.hasErrors('tel')}"
					   th:errors="*{tel}"
					   style="color:red; font-size:0.75rem; margin-left:0.75rem; margin-top:0.25rem;"></p>
            </div>

            <!-- メール -->
            <div class="mt-4">
                <label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">メール</label>
                <input type="text" name="email" th:value="*{email}"
                       placeholder="メールアドレスをご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                 
                 <p th:if="${#fields.hasErrors('email')}"
					   th:errors="*{email}"
					   style="color:red; font-size:0.75rem; margin-left:0.75rem; margin-top:0.25rem;"></p>
            </div>

            <!-- 郵便番号 -->
            <div class="mt-4 w-1/3">
                <label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">郵便番号</label>
                <input type="text" name="postalCode" th:value="*{postalCode}"
                       placeholder="郵便番号をご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                       
                 <p th:if="${#fields.hasErrors('postalCode')}"
					   th:errors="*{postalCode}"
					   style="color:red; font-size:0.75rem; margin-left:0.75rem; margin-top:0.25rem;"></p>
                 
            </div>

            <!-- 住所 -->
            <div class="mt-4">
                <label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">住所</label>
                <input type="text" name="address" th:value="*{address}"
                       placeholder="住所をご入力ください" tabindex="1"
                       class="w-full text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
            </div>

            <!-- 備考 -->
            <div class="mt-4">
                <label class="ml-3 block text-sm font-bold text-gray-700 tracking-wide">備考</label>
                <textarea name="remarks" th:text="*{remarks}" rows="6" tabindex="1"
                          class="mt-2 w-full px-5 py-2 text-gray-700 bg-gray-100 rounded"></textarea>
            </div>

            <!-- ボタン -->
            <div class="flex items-center justify-between mt-10">

                <!-- 戻る -->
                <a th:href="@{/supplier}"
                   style="min-width:120px; background:#9ca3af; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer;">
                    戻る
                </a>

                <!-- 登録 or 更新 -->
                <button type="submit"
                        th:text="${company.id != null} ? '更新' : '登録'"
                        th:style="${company.id != null} ?
                            'min-width:120px; background:green; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer;' :
                            'min-width:120px; background:green; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer;'">
                </button>

                <!-- 削除: 編集時のみ -->
                <button th:if="${company.id != null}"
                        type="submit" form="deleteForm"
                        onclick="return confirm('本当に削除しますか？');"
                        style="min-width:120px; background:red; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer;">
                    削除
                </button>

            </div>
        </form>

        <!-- 削除フォーム -->
        <form th:if="${company.id != null}" id="deleteForm"
              th:action="@{/supplier/delete/{id}(id=${company.id})}" method="post">
        </form>
    </div>
</main>
<script></script>
</html>
