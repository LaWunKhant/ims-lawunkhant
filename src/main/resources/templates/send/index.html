<html th:replace="~{layouts/base :: layout('発送管理', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
	<form th:action="@{/send}" method="get">
		<div class="w-9/12 flex flex-wrap">
			<div class="w-1/2 pr-2">
				<label for="companyId" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">取引先</label>
				<select name="companyId" id="companyId" tabindex="1" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option th:each="company : ${companies}"
							th:value="${company.id}"
							th:text="${company.companyName}"
							th:selected="${companyId == company.id}">
					</option>
				</select>
			</div>
			<div class="w-1/4">
				<label for="status" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">状態</label>
				<select name="status" id="status" tabindex="1" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option value="1" th:selected="${status == 1}">未発送</option>
					<option value="2" th:selected="${status == 2}">発送済</option>
				</select>
			</div>
		</div>
		<div class="flex flex-wrap mt-2">
			<div class="w-3/6 pr-2 flex">
				<div class="w-1/2 pr-2">
					<label for="orderDateFrom" class="w-full block ml-3 text-sm font-bold text-gray-700 tracking-wide">受注日</label>
					<input type="date" name="orderDateFrom" th:value="${orderDateFrom}" tabindex="1" id="orderDateFrom" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
				</div>
				<div class="w-1/12 pr-2 text-center mt-auto mb-2">～</div>
				<div class="w-1/2 mt-auto">
					<input type="date" name="orderDateTo" th:value="${orderDateTo}" tabindex="1" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
				</div>
			</div>
			<div class="w-1/6 pr-2 mt-auto">
				<a th:href="@{/send}" tabindex="1" class="w-full flex justify-center bg-gradient-to-r from-gray-500 to-gray-600 hover:bg-gradient-to-l hover:from-gray-500 hover:to-gray-600 text-gray-100 p-2 rounded-full tracking-wide font-semibold shadow-lg cursor-pointer transition ease-in duration-500">クリア</a>
			</div>
			<div class="w-1/6 mt-auto">
				<button type="submit" name="search" tabindex="1" class="w-full flex justify-center bg-gradient-to-r from-indigo-500 to-blue-600 hover:bg-gradient-to-l hover:from-blue-500 hover:to-indigo-600 text-gray-100 p-2 rounded-full tracking-wide font-semibold shadow-lg cursor-pointer transition ease-in duration-500">検索</button>
			</div>
		</div>
	</form>
	<div class="w-full mt-2">
		<h2 class="text-xl pb-3 flex items-center mt-5"><i class="fas fa-list mr-3"></i>発送一覧</h2>
		<div class="bg-white u-widthMin">
			<table class="border-2 border-gray-100 min-w-full bg-white">
				<thead class="bg-gray-800 text-white">
					<tr>
						<th class="py-3 px-4 uppercase font-semibold text-sm">受注日</th>
						<th class="w-1/4 py-3 px-4 uppercase font-semibold text-left text-sm">取引先</th>
						<th class="w-1/6 py-3 px-4 uppercase font-semibold text-sm">受注数/在庫数</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">状態</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">金額</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">充当日</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">発送日</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">入力者</th>
					</tr>
				</thead>
				<tbody class="text-gray-700">
					<tr th:if="${orders.empty}">
						<td class="border text-center py-3 px-4" colspan="8">表示するデータがありません</td>
					</tr>
					<tr th:each="order, stat : ${orders}" th:classappend="${stat.odd} ? 'bg-gray-200' : ''">
						<td class="border text-center py-3 px-4">
							<a th:href="@{/send/entry/{id}(id=${order.id})}" class="underline underline-offset-4 hover:text-blue-500" th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}"></a>
						</td>
						<td class="border text-left py-3 px-4" th:text="${order.company?.companyName}"></td>
						<td class="border text-left py-3 px-4" th:text="${order.quantity} + '/' + ${order.product?.stock}"></td>
						<td class="border text-center py-3 px-4" th:text="${order.status == 1} ? '未発送' : (${order.status == 2} ? '発送済' : '-')"></td>
						<td class="border text-right py-3 px-4" th:text="${#numbers.formatInteger(order.billingAmount, 1, 'COMMA')}"></td>
						<td class="border text-center py-3 px-4" th:text="${order.allocationDate != null} ? ${#temporals.format(order.allocationDate, 'yyyy/MM/dd')} : '-'"></td>
						<td class="border text-center py-3 px-4" th:text="${order.sendDate != null} ? ${#temporals.format(order.sendDate, 'yyyy/MM/dd')} : ''"></td>
						<td class="border text-left py-3 px-4" th:text="${order.createdMemberId != null} ? ${order.createdMemberId} : '-'"></td>
					</tr>
				</tbody>
			</table>
		</div>
		<form th:if="${orders.totalPages > 0}" class="flex mt-3" th:action="@{/send}" method="get">
			<ul class="inline-flex space-x-2 m-auto">
				<li>
					<a th:if="${orders.hasPrevious()}"
					   th:href="@{/send(page=${orders.number - 1}, companyId=${companyId}, status=${status}, orderDateFrom=${orderDateFrom}, orderDateTo=${orderDateTo})}"
					   class="flex items-center justify-center w-10 h-10 text-indigo-600 transition-colors duration-150 rounded-full focus:shadow-outline hover:bg-indigo-100">
						<svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
					</a>
					<span th:unless="${orders.hasPrevious()}" class="flex items-center justify-center w-10 h-10 text-gray-400">
						<svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
					</span>
				</li>
				<li th:each="pageNum : ${#numbers.sequence(1, orders.totalPages)}">
					<a th:if="${pageNum - 1 != orders.number}"
					   th:href="@{/send(page=${pageNum - 1}, companyId=${companyId}, status=${status}, orderDateFrom=${orderDateFrom}, orderDateTo=${orderDateTo})}"
					   th:text="${pageNum}"
					   class="w-10 h-10 text-indigo-600 transition-colors duration-150 rounded-full hover:bg-indigo-100 focus:shadow-outline flex items-center justify-center">
					</a>
					<span th:if="${pageNum - 1 == orders.number}"
					      th:text="${pageNum}"
					      class="w-10 h-10 text-white transition-colors duration-150 bg-indigo-600 border border-r-0 border-indigo-600 rounded-full focus:shadow-outline flex items-center justify-center">
					</span>
				</li>
				<li>
					<a th:if="${orders.hasNext()}"
					   th:href="@{/send(page=${orders.number + 1}, companyId=${companyId}, status=${status}, orderDateFrom=${orderDateFrom}, orderDateTo=${orderDateTo})}"
					   class="flex items-center justify-center w-10 h-10 text-indigo-600 transition-colors duration-150 rounded-full focus:shadow-outline hover:bg-indigo-100">
						<svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
					</a>
					<span th:unless="${orders.hasNext()}" class="flex items-center justify-center w-10 h-10 text-gray-400">
						<svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" fill-rule="evenodd"></path></svg>
					</span>
				</li>
			</ul>
		</form>
	</div>
</main>
<script></script>
</html>
