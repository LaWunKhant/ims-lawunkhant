<html th:replace="~{layouts/base :: layout('入金新規登録', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
	<div class="w-1/2 mt-2 my-6">
		<h2 class="text-xl pb-3 flex items-center"><i class="fas fa-yen-sign mr-3"></i>入金データ登録</h2>
		<form th:action="@{/payment/entry}" method="post" th:object="${payment}" class="p-10 bg-white rounded shadow-xl">

			<!-- Company Selection -->
			<div class="mt-4">
				<label for="companyId" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金先<span class="text-red-600">*</span></label>
				<select name="companyId" id="companyId" 
						class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500"
						th:classappend="${#fields.hasErrors('companyId')} ? 'border-red-500' : ''">
					<option value="">選択してください</option>
					<option th:each="company : ${companies}" 
							th:value="${company.id}" 
							th:text="${company.companyName}">
					</option>
				</select>
				<p th:if="${#fields.hasErrors('companyId')}" class="text-red-600 text-sm mt-1 ml-3" th:errors="*{companyId}"></p>
			</div>

			<!-- Payment Date -->
			<div class="mt-2">
				<label for="paymentDate" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金日<span class="text-red-600">*</span></label>
				<input type="date" name="paymentDate" th:value="${#temporals.format(payment.paymentDate, 'yyyy-MM-dd')}" id="paymentDate" 
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500"
					   th:classappend="${#fields.hasErrors('paymentDate')} ? 'border-red-500' : ''">
				<p th:if="${#fields.hasErrors('paymentDate')}" class="text-red-600 text-sm mt-1 ml-3" th:errors="*{paymentDate}"></p>
			</div>

			<!-- Payment Type -->
			<div class="mt-2">
				<label for="paymentType" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金区分<span class="text-red-600">*</span></label>
				<select name="paymentType" id="paymentType" 
						class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500"
						th:classappend="${#fields.hasErrors('paymentType')} ? 'border-red-500' : ''">
					<option value="">選択してください</option>
					<option value="1">銀行振込</option>
					<option value="2">カード決済</option>
				</select>
				<p th:if="${#fields.hasErrors('paymentType')}" class="text-red-600 text-sm mt-1 ml-3" th:errors="*{paymentType}"></p>
			</div>

			<!-- Payment Amount -->
			<div class="mt-2">
				<label for="paymentAmount" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金額<span class="text-red-600">*</span></label>
				<input type="number" name="paymentAmount" th:field="*{paymentAmount}" id="paymentAmount" 
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500"
					   th:classappend="${#fields.hasErrors('paymentAmount')} ? 'border-red-500' : ''"
					   placeholder="0">
				<p th:if="${#fields.hasErrors('paymentAmount')}" class="text-red-600 text-sm mt-1 ml-3" th:errors="*{paymentAmount}"></p>
			</div>

			<!-- BUTTONS -->
			<div style="display: flex; gap: 12px; margin-top: 40px;">
				<a th:href="@{/payment}"
				   style="min-width:120px; background:#9ca3af; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">
					戻る
				</a>
				<button type="submit"
						style="min-width:120px; background:#22c55e; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">
					保存
				</button>
			</div>
		</form>
	</div>
</main>
<script></script>
</html>
