<html th:replace="~{layouts/base :: layout('企業マスタ', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">

    <!-- Success/Error messages -->
    <div th:if="${successMessage}"
         style="background:#d1fae5; border:1px solid #6ee7b7; color:#065f46; padding:12px 20px; border-radius:8px; margin-bottom:16px; font-weight:bold;">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}"
         style="background:#fee2e2; border:1px solid #fca5a5; color:#991b1b; padding:12px 20px; border-radius:8px; margin-bottom:16px; font-weight:bold;">
        ⚠️ <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/supplier}" method="get">
        <div class="w-3/6 flex">
            <div class="w-1/2 pr-2">
                <label for="code" class="w-full block ml-3 text-sm font-bold text-gray-700 tracking-wide">企業コード</label>
                <input type="text" name="str_code" th:value="${param.str_code}" tabindex="1"
                       placeholder="企業コードをご入力ください" id="code"
                       class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
            </div>
            <div class="w-1/12 pr-2 text-center mt-auto mb-2">～</div>
            <div class="w-1/2 mt-auto">
                <input type="text" name="end_code" th:value="${param.end_code}" tabindex="1"
                       placeholder="企業コードをご入力ください"
                       class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
            </div>
        </div>
        <div class="flex flex-wrap mt-2">
            <div class="w-3/6 pr-2 flex">
                <div class="w-1/2 pr-2">
                    <label for="companyName" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">企業名</label>
                    <input type="text" name="companyName" th:value="${param.companyName}" tabindex="1"
                           placeholder="企業名をご入力ください" id="companyName"
                           class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                </div>
                <div class="w-1/2">
                    <label for="tel" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">電話番号</label>
                    <input type="text" name="tel" th:value="${param.tel}" tabindex="1"
                           placeholder="03-0000-0000" id="tel"
                           class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
                </div>
            </div>
            <div class="w-1/6 pr-2 mt-auto">
                <a th:href="@{/supplier}" tabindex="1"
                   class="w-full flex justify-center bg-gradient-to-r from-gray-500 to-gray-600 hover:bg-gradient-to-l text-gray-100 p-2 rounded-full font-semibold shadow-lg cursor-pointer transition ease-in duration-500">
                    クリア
                </a>
            </div>
            <div class="w-1/6 pr-2 mt-auto">
                <button type="submit" tabindex="1"
                        class="w-full flex justify-center bg-gradient-to-r from-indigo-500 to-blue-600 hover:bg-gradient-to-l text-gray-100 p-2 rounded-full font-semibold shadow-lg cursor-pointer transition ease-in duration-500">
                    検索
                </button>
            </div>
            <div class="w-1/6 mt-auto">
                <a th:href="@{/supplier/entry}" tabindex="1"
                   class="w-full flex justify-center bg-gradient-to-r from-green-500 to-green-600 hover:bg-gradient-to-l text-gray-100 p-2 rounded-full font-semibold shadow-lg cursor-pointer transition ease-in duration-500">
                    登録
                </a>
            </div>
        </div>
    </form>

    <div class="w-full mt-2">
        <h2 class="text-xl pb-3 flex items-center mt-5"><i class="fas fa-list mr-3"></i>企業一覧</h2>
        <div class="bg-white overflow-x-auto">
            <table class="border-2 border-gray-100 min-w-full bg-white">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="py-3 px-4 font-semibold text-sm">企業コード</th>
                        <th class="w-1/5 py-3 px-4 font-semibold text-left text-sm">企業名</th>
                        <th class="py-3 px-4 font-semibold text-sm">TEL</th>
                        <th class="w-1/5 py-3 px-4 font-semibold text-left text-sm">メール</th>
                        <th class="w-1/5 py-3 px-4 font-semibold text-left text-sm">住所</th>
                        <th class="w-1/5 py-3 px-4 font-semibold text-left text-sm">備考</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700">
                    <tr th:if="${#lists.isEmpty(companies)}">
                        <td class="border text-center py-3 px-4" colspan="6">表示するデータがありません</td>
                    </tr>
                    <tr th:each="company, status : ${companies}"
                        th:class="${status.even} ? 'bg-gray-50' : 'bg-white'"
                        class="hover:bg-indigo-50 transition-colors duration-150">
                        <td class="border text-center py-3 px-4">
                            <a th:href="@{/supplier/entry/{id}(id=${company.id})}"
                               th:text="${company.companyCode}"
                               class="underline underline-offset-2 text-indigo-600 hover:text-indigo-900 font-medium"></a>
                        </td>
                        <td class="border text-left py-3 px-4" th:text="${company.companyName}"></td>
                        <td class="border text-center py-3 px-4" th:text="${company.tel}"></td>
                        <td class="border text-left py-3 px-4">
                            <a th:if="${company.email != null}"
                               th:href="'mailto:' + ${company.email}"
                               th:text="${company.email}"
                               class="underline underline-offset-4 hover:text-blue-500"></a>
                        </td>
                        <td class="border text-left py-3 px-4" th:text="${company.address}"></td>
                        <td class="border text-left py-3 px-4" th:text="${company.remarks}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
<script></script>
</html>
