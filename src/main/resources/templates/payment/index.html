<html th:replace="~{layouts/base :: layout('入金管理', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
	<h2 class="text-2xl pb-3 flex items-center"><i class="fas fa-yen-sign mr-3"></i>入金管理</h2>
	
	<!-- Flash Messages -->
	<div th:if="${message}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" th:text="${message}"></div>
	<div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" th:text="${error}"></div>
	
	<form id="fileupload" th:action="@{/payment/upload}" method="post" enctype="multipart/form-data"></form>
	
	<!-- Search Form -->
	<form th:action="@{/payment}" method="get" class="bg-white p-6 rounded shadow mb-6">
		<div class="w-full flex flex-wrap">
			<div class="w-1/4 pr-2">
				<label for="companyId" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">入金先</label>
				<select name="companyId" id="companyId" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option th:each="company : ${companies}" th:value="${company.id}" th:text="${company.companyName}" th:selected="${companyId == company.id}"></option>
				</select>
			</div>
			<div class="w-1/4 pr-2">
				<label for="status" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">状態</label><br>
				<select name="status" id="status" class="w-2/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option value="unallocated" th:selected="${status == 'unallocated'}">未充当</option>
					<option value="allocated" th:selected="${status == 'allocated'}">充当済</option>
				</select>
			</div>
			<div class="w-1/3 pr-2">
				<label for="upload" class="ml-3 text-sm font-bold text-gray-700 tracking-wide">CSV取込</label>
				<input type="file" name="upload" id="upload" form="fileupload" class="w-full content-center text-base px-4 pt-1.5 pb-1.5 bg-white border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
			</div>
			<div class="w-1/6 mt-auto">
				<button type="submit" form="fileupload" style="width:100%; background:#dc2626; color:white; font-weight:bold; padding:8px 16px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">アップロード</button>
			</div>
		</div>
		<div class="w-full flex flex-wrap mt-2">
			<div class="w-3/6 pr-2 flex">
				<div class="w-1/2 pr-2">
					<label for="paymentDateFrom" class="w-full block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金日</label>
					<input type="date" name="paymentDateFrom" th:value="${paymentDateFrom}" id="paymentDateFrom" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
				</div>
				<div class="w-1/12 pr-2 text-center mt-auto mb-2">～</div>
				<div class="w-1/2 mt-auto">
					<input type="date" name="paymentDateTo" th:value="${paymentDateTo}" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
				</div>
			</div>
			<div class="w-1/6 pr-2 mt-auto">
				<a th:href="@{/payment}" style="width:100%; display:flex; justify-content:center; background:#6b7280; color:white; font-weight:bold; padding:8px 16px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">クリア</a>
			</div>
			<div class="w-1/6 pr-2 mt-auto">
				<button type="submit" style="width:100%; background:#4f46e5; color:white; font-weight:bold; padding:8px 16px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">検索</button>
			</div>
			<div class="w-1/6 mt-auto">
				<a th:href="@{/payment/entry}" style="width:100%; display:flex; justify-content:center; background:#22c55e; color:white; font-weight:bold; padding:8px 16px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">新規登録</a>
			</div>
		</div>
	</form>
	
	<!-- Payments Table -->
	<div class="w-full mt-2">
		<h2 class="text-xl pb-3 flex items-center mt-5"><i class="fas fa-list mr-3"></i>入金一覧</h2>
		<div class="bg-white u-widthMin">
			<table class="border-2 border-gray-100 min-w-full bg-white">
				<thead class="bg-gray-800 text-white">
					<tr>
						<th class="py-3 px-4 uppercase font-semibold text-sm">入金日</th>
						<th class="w-1/5 py-3 px-4 uppercase font-semibold text-left text-sm">入金先</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">状態</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">入金額</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">充当日</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">発送予定日</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">入金区分</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm">入力者</th>
					</tr>
				</thead>
				<tbody class="text-gray-700">
					<tr th:if="${payments.isEmpty()}">
						<td class="border text-center py-3 px-4" colspan="8">表示するデータがありません</td>
					</tr>
					<tr th:each="payment, iterStat : ${payments}" th:class="${iterStat.odd} ? '' : 'bg-gray-200'">
						<td class="border text-center py-3 px-4">
							<a th:href="@{/payment/edit/{id}(id=${payment.id})}" class="underline underline-offset-4 hover:text-blue-500" th:text="${#temporals.format(payment.paymentDate, 'yyyy/MM/dd')}"></a>
						</td>
						<td class="border text-left py-3 px-4" th:text="${payment.company.companyName}"></td>
						<td class="border text-center py-3 px-4">
							<span th:if="${payment.orderId == null}">未充当</span>
							<span th:if="${payment.orderId != null}">充当済</span>
						</td>
						<td class="border text-right py-3 px-4" th:text="${#numbers.formatInteger(payment.paymentAmount, 1, 'COMMA')}"></td>
						<td class="border text-center py-3 px-4" th:text="${payment.allocationDate != null ? #temporals.format(payment.allocationDate, 'yyyy/MM/dd') : ''}"></td>
						<td class="border text-center py-3 px-4" th:text="${payment.order != null and payment.order.paymentDueDate != null ? #temporals.format(payment.order.paymentDueDate, 'yyyy/MM/dd') : ''}"></td>
						<td class="border text-center py-3 px-4" th:text="${payment.getPaymentTypeLabel()}"></td>
						<td class="border text-center py-3 px-4">-</td>
					</tr>
				</tbody>
			</table>
		</div>
		
		<!-- Pagination -->
		<div th:if="${payments.totalPages > 0}" class="flex mt-3">
			<ul class="inline-flex space-x-2 m-auto">
				<li th:if="${payments.hasPrevious()}">
					<a th:href="@{/payment(page=${payments.number - 1}, companyId=${companyId}, status=${status}, paymentDateFrom=${paymentDateFrom}, paymentDateTo=${paymentDateTo})}" class="flex items-center justify-center w-10 h-10 text-indigo-600 transition-colors duration-150 rounded-full focus:shadow-outline hover:bg-indigo-100">‹</a>
				</li>
				<li th:each="i : ${#numbers.sequence(0, payments.totalPages - 1)}">
					<a th:if="${i != payments.number}" th:href="@{/payment(page=${i}, companyId=${companyId}, status=${status}, paymentDateFrom=${paymentDateFrom}, paymentDateTo=${paymentDateTo})}" class="w-10 h-10 flex items-center justify-center text-indigo-600 transition-colors duration-150 rounded-full hover:bg-indigo-100 focus:shadow-outline" th:text="${i + 1}"></a>
					<span th:if="${i == payments.number}" class="w-10 h-10 flex items-center justify-center text-white transition-colors duration-150 bg-indigo-600 rounded-full focus:shadow-outline" th:text="${i + 1}"></span>
				</li>
				<li th:if="${payments.hasNext()}">
					<a th:href="@{/payment(page=${payments.number + 1}, companyId=${companyId}, status=${status}, paymentDateFrom=${paymentDateFrom}, paymentDateTo=${paymentDateTo})}" class="flex items-center justify-center w-10 h-10 text-indigo-600 transition-colors duration-150 rounded-full focus:shadow-outline hover:bg-indigo-100">›</a>
				</li>
			</ul>
		</div>
	</div>
</main>
<script></script>
</html>
