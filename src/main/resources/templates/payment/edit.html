<html th:replace="~{layouts/base :: layout('入金変更登録', ~{::main}, ~{::script})}">
<main class="w-4/6 flex flex-col flex-grow p-6">
	<h2 class="text-xl mt-2 pb-3 flex items-center"><i class="fas fa-list mr-3"></i>入金変更</h2>

	<!-- Flash Messages -->
	<div th:if="${message}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" th:text="${message}"></div>
	<div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" th:text="${error}"></div>

	<div class="p-10 bg-white rounded shadow-xl">
		<div class="mt-2">
			<label class="block mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">入金先</label>
			<input type="text" th:value="${payment.company.companyName}" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
		</div>
		<div class="mt-2">
			<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">状態</label>
			<input type="text" th:value="${payment.orderId == null ? '未充当' : '充当済'}" class="w-1/5 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
		</div>
		<div class="mt-2">
			<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金日</label>
			<input type="text" th:value="${#temporals.format(payment.paymentDate, 'yyyy/MM/dd')}" class="w-1/5 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
		</div>
		<div class="mt-2">
			<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金区分</label>
			<input type="text" th:value="${payment.getPaymentTypeLabel()}" class="w-1/5 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
		</div>
		<div class="mt-2">
			<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金額</label>
			<input type="text" th:value="${#numbers.formatInteger(payment.paymentAmount, 1, 'COMMA')}" class="w-1/5 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
		</div>
		<div class="mt-2">
			<label for="shippingDate" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">発送予定日</label>
			<input type="date" name="shippingDate" id="shippingDate" form="allocateForm"
				   th:value="${payment.order != null and payment.order.shippingDate != null} ? ${#temporals.format(payment.order.shippingDate, 'yyyy-MM-dd')} : ''"
				   th:disabled="${payment.orderId != null}"
				   class="w-1/5 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
		</div>

		<!-- 伝票リスト -->
		<div class="mt-2">
			<h2 class="text-xl pb-3 flex items-center mt-5">伝票リスト</h2>
			<table class="border-2 border-gray-100 min-w-full bg-white">
				<thead class="bg-gray-800 text-white">
					<tr>
						<th class="py-3 px-4 uppercase font-semibold text-sm whitespace-nowrap">対象</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm whitespace-nowrap">受注日</th>
						<th class="w-2/5 py-3 px-4 uppercase font-semibold text-left text-sm whitespace-nowrap">商品名</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm whitespace-nowrap">受注数</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm whitespace-nowrap">請求金額</th>
						<th class="py-3 px-4 uppercase font-semibold text-sm whitespace-nowrap">入金予定日</th>
					</tr>
				</thead>
				<tbody class="text-gray-700">
					<tr th:if="${orders.isEmpty()}">
						<td class="border text-center py-3 px-4" colspan="6">対象の伝票がありません</td>
					</tr>
					<tr th:each="order, iterStat : ${orders}" th:class="${iterStat.odd} ? '' : 'bg-gray-200'">
						<td class="border text-center py-3 px-4">
							<input type="radio" name="orderId" form="allocateForm" th:value="${order.id}" th:checked="${payment.orderId == order.id}" class="w-4 h-4 text-blue-600 bg-gray-100 rounded border-gray-300 focus:ring-blue-500 focus:ring-2">
						</td>
						<td class="border text-center py-3 px-4" th:text="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}"></td>
						<td class="border text-left py-3 px-4" th:text="${order.product.productName}"></td>
						<td class="border text-center py-3 px-4" th:text="${order.quantity}"></td>
						<td class="border text-right py-3 px-4" th:text="${#numbers.formatInteger(order.billingAmount, 1, 'COMMA')}"></td>
						<td class="border text-center py-3 px-4" th:text="${order.paymentDueDate != null ? #temporals.format(order.paymentDueDate, 'yyyy/MM/dd') : ''}"></td>
					</tr>
				</tbody>
			</table>
		</div>

		<!-- BUTTONS -->
		<div class="flex flex-wrap gap-3 mt-10">
			<a th:href="@{/payment}" style="min-width:120px; background:#9ca3af; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">戻る</a>

			<!-- 削除: only enabled when 未充当 (not yet allocated) -->
			<button type="submit" form="deleteForm"
					th:disabled="${payment.orderId != null}"
					onclick="return confirm('削除してもよろしいですか？');"
					th:style="${payment.orderId != null} ?
						'min-width:120px; background:#d1d5db; color:#9ca3af; font-weight:bold; padding:12px 24px; border-radius:9999px; cursor:not-allowed; border:none;' :
						'min-width:120px; background:#374151; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;'">削除</button>

			<!-- 充当: only enabled when 未充当 (not yet allocated) -->
			<button type="submit" form="allocateForm"
					th:disabled="${payment.orderId != null}"
					th:style="${payment.orderId != null} ?
						'min-width:120px; background:#d1d5db; color:#9ca3af; font-weight:bold; padding:12px 24px; border-radius:9999px; cursor:not-allowed; border:none;' :
						'min-width:120px; background:#dc2626; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;'">充当</button>

			<!-- 充当解除: only enabled when 充当済 (already allocated) -->
			<button type="submit" form="deallocateForm"
					th:disabled="${payment.orderId == null}"
					th:style="${payment.orderId == null} ?
						'min-width:120px; background:#d1d5db; color:#9ca3af; font-weight:bold; padding:12px 24px; border-radius:9999px; cursor:not-allowed; border:none;' :
						'min-width:120px; background:#65a30d; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;'">充当解除</button>
		</div>
	</div>

	<!-- Hidden Forms -->
	<form id="deleteForm" th:action="@{/payment/delete/{id}(id=${payment.id})}" method="post"></form>
	<form id="allocateForm" th:action="@{/payment/allocate/{id}(id=${payment.id})}" method="post"></form>
	<form id="deallocateForm" th:action="@{/payment/deallocate/{id}(id=${payment.id})}" method="post"></form>
</main>
<script></script>
</html>
