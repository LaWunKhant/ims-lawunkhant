<html th:replace="~{layouts/base :: layout('発送登録／変更', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
	<div class="w-1/2 mt-2 my-6">
		<h2 class="text-xl pb-3 flex items-center"><i class="fas fa-list mr-3"></i>発送登録変更</h2>

		<div th:if="${message}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4" th:text="${message}"></div>
		<div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" th:text="${error}"></div>

		<div class="p-10 bg-white rounded shadow-xl">
			<div class="mt-2">
				<label class="mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">取引先</label>
				<input type="text" th:value="${order.company?.companyName}" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">状態</label>
				<input type="text" th:value="${order.status == 1} ? '未発送' : (${order.status == 2} ? '発送済' : '-')" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">受注日</label>
				<input type="text" th:value="${#temporals.format(order.orderDate, 'yyyy/MM/dd')}" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">充当日</label>
				<input type="text" th:value="${order.allocationDate != null} ? ${#temporals.format(order.allocationDate, 'yyyy/MM/dd')} : '-'" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="ml-3 text-sm font-bold text-gray-700 tracking-wide">商品</label>
				<input type="text" th:value="${order.product?.productName}" class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">受注数／在庫数</label>
				<input type="text" th:value="${order.quantity} + '／' + ${order.product?.stock}" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">金額</label>
				<input type="text" th:value="${#numbers.formatInteger(order.billingAmount, 1, 'COMMA')}" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">発送予定日</label>
				<input type="text" th:value="${order.shippingDate != null} ? ${#temporals.format(order.shippingDate, 'yyyy/MM/dd')} : '-'" class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500" disabled>
			</div>
			<div class="mt-2">
				<label for="sendDate" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">発送日</label>
				<input type="date" name="sendDate" id="sendDate" form="shipForm"
					   th:value="${order.sendDate != null} ? ${#temporals.format(order.sendDate, 'yyyy-MM-dd')} : ''"
					   th:disabled="${order.status == 2}"
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
			</div>

			<div class="flex flex-wrap mt-10">
				<a th:href="@{/send}" style="min-width:120px; margin-right:16px; background:#9ca3af; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">戻る</a>
			
				<button th:if="${order.status != 2}"
						type="submit" form="shipForm"
						style="min-width:120px; background:#dc2626; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">発送</button>
			
				<button th:if="${order.status == 2}"
						type="submit" form="unshipForm"
						style="min-width:120px; background:#374151; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">発送解除</button>
			</div>
		</div>

		<form id="shipForm" th:action="@{/send/ship/{id}(id=${order.id})}" method="post"></form>
		<form id="unshipForm" th:action="@{/send/unship/{id}(id=${order.id})}" method="post"></form>
	</div>
</main>
<script></script>
</html>
