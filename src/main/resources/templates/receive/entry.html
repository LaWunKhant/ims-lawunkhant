<html th:replace="~{layouts/base :: layout('受注登録／変更', ~{::main}, ~{::script})}">
<main class="w-full flex flex-col flex-grow p-6">
	<div class="w-1/2 mt-2 my-6">
		<h2 class="text-xl pb-3 flex items-center"><i class="fas fa-list mr-3"></i>受注依頼登録変更</h2>
		<form th:action="@{/receive/entry}" method="post" th:object="${order}" class="p-10 bg-white rounded shadow-xl">
			<input type="hidden" th:field="*{id}">

			<!-- Validation Errors -->
			<div th:if="${#fields.hasErrors('*')}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
				<p class="font-semibold mb-2">エラーが発生しました</p>
				<ul class="list-disc list-inside space-y-1">
					<li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
				</ul>
			</div>

			<!-- Company Selection -->
			<div class="mt-4">
				<label for="companyId" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">取引先<span class="text-red-600">*</span></label>
				<select name="companyId" id="companyId" 
						class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option th:each="company : ${companies}" 
							th:value="${company.id}" 
							th:text="${company.companyName}"
							th:selected="${order.companyId == company.id}">
					</option>
				</select>
			</div>

			<!-- Order Date -->
			<div class="mt-2">
				<label for="orderDate" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">受注日<span class="text-red-600">*</span></label>
				<input type="date" name="orderDate" th:value="${#temporals.format(order.orderDate, 'yyyy-MM-dd')}" id="orderDate" 
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
			</div>

			<!-- Product Selection -->
			<div class="mt-2">
				<label for="productId" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">商品<span class="text-red-600">*</span></label>
				<select name="productId" id="productId" 
						class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
					<option value="">選択してください</option>
					<option th:each="product : ${products}"
							th:value="${product.id}"
							th:text="${product.productName}"
							th:data-price="${product.price}"
							th:selected="${order.productId == product.id}">
					</option>
				</select>
			</div>

			<!-- Unit Price -->
			<div class="mt-2">
				<label class="mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">単価</label>
				<input type="text" name="unitPrice" th:field="*{unitPrice}" 
					   class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300" readonly>
			</div>

			<!-- Quantity -->
			<div class="mt-2">
				<label for="quantity" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">商品受注数<span class="text-red-600">*</span></label>
				<input type="number" name="quantity" th:field="*{quantity}" id="quantity" 
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300 focus:outline-none focus:border-indigo-500">
			</div>

			<!-- Amount -->
			<div class="mt-2">
				<label class="mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">金額</label>
				<input type="text" name="amount" th:field="*{amount}" 
					   class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300" readonly>
			</div>

			<!-- Tax Flag -->
			<div class="mt-4">
				<label class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">課税<span class="text-red-600">*</span></label>
				<div class="flex">
					<div class="flex items-center ml-4">
						<input id="taxFlag0" type="radio" value="0" th:field="*{taxFlag}" class="w-4 h-4">
						<label for="taxFlag0" class="ml-2">非課税</label>
					</div>
					<div class="flex items-center ml-4">
						<input id="taxFlag1" type="radio" value="1" th:field="*{taxFlag}" class="w-4 h-4">
						<label for="taxFlag1" class="ml-2">課税</label>
					</div>
				</div>
			</div>

			<!-- Billing Amount -->
			<div class="mt-2">
				<label class="mt-2 ml-3 text-sm font-bold text-gray-700 tracking-wide">請求金額</label>
				<input type="text" name="billingAmount" th:field="*{billingAmount}" 
					   class="w-full content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300" readonly>
			</div>

			<!-- Payment Due Date -->
			<div class="mt-2">
				<label for="paymentDueDate" class="block ml-3 text-sm font-bold text-gray-700 tracking-wide">入金予定日</label>
				<input type="date" name="paymentDueDate" th:value="${#temporals.format(order.paymentDueDate, 'yyyy-MM-dd')}" id="paymentDueDate" 
					   class="w-1/3 content-center text-base px-4 py-2 border-b rounded-2xl border-gray-300">
			</div>

			<!-- BUTTONS -->
			<div style="display: flex; gap: 12px; margin-top: 40px;">
				<!-- 戻る -->
				<a th:href="@{/receive}"
				   style="min-width:120px; background:#9ca3af; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; text-align:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; text-decoration:none;">
					戻る
				</a>

				<!-- 保存 or 更新 -->
				<button type="submit"
						th:text="${order.id != null} ? '更新' : '保存'"
						th:style="${order.id != null} ?
							'min-width:120px; background:#f97316; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;' :
							'min-width:120px; background:#22c55e; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;'">
				</button>

				<!-- 削除: 編集時のみ -->
				<button th:if="${order.id != null}"
						type="submit" form="deleteForm"
						onclick="return confirm('削除してもよろしいですか？');"
						style="min-width:120px; background:#dc2626; color:white; font-weight:bold; padding:12px 24px; border-radius:9999px; box-shadow:0 4px 6px rgba(0,0,0,0.1); cursor:pointer; border:none;">
					削除
				</button>
			</div>
		</form>

		<!-- Delete Form (OUTSIDE main form) -->
		<form th:if="${order.id != null}" id="deleteForm" th:action="@{/receive/delete/{id}(id=${order.id})}" method="post"></form>
	</div>
</main>
<script>
	const productSelect = document.getElementById('productId');
	const quantityInput = document.getElementById('quantity');
	const unitPriceInput = document.querySelector('input[name="unitPrice"]');
	const amountInput = document.querySelector('input[name="amount"]');
	const taxFlag0 = document.getElementById('taxFlag0');
	const taxFlag1 = document.getElementById('taxFlag1');
	const billingAmountInput = document.querySelector('input[name="billingAmount"]');

	function recalculate() {
		if (productSelect.value) {
			const selectedOption = productSelect.options[productSelect.selectedIndex];
			const price = selectedOption.getAttribute('data-price');
			unitPriceInput.value = price || 0;
		} else {
			unitPriceInput.value = '';
		}

		const unitPrice = parseInt(unitPriceInput.value) || 0;
		const quantity = parseInt(quantityInput.value) || 0;
		const amount = unitPrice * quantity;
		amountInput.value = amount;

		const taxFlag = taxFlag1.checked ? 1 : 0;
		const billingAmount = taxFlag === 1 ? Math.round(amount * 1.10) : amount;
		billingAmountInput.value = billingAmount;
	}

	productSelect.addEventListener('change', function() {
		quantityInput.value = '';
		recalculate();
	});
	quantityInput.addEventListener('input', recalculate);
	taxFlag0.addEventListener('change', recalculate);
	taxFlag1.addEventListener('change', recalculate);

	recalculate();
</script>
</html>
