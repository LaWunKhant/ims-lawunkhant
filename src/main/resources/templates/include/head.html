<head th:fragment="head(title)">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.5">
	<meta name="format-detection" content="telephone=no">
	<meta name="apple-mobile-web-app-title" content="IMS">
	<!-- API Token -->
	<meta name="api_token" content="{{ Auth::user()->api_token ?? null }}">
	<title th:text="${title} == '' ? 'IMS' : ${title} + ' | ' + 'IMS'"></title>
	<link rel="icon" href="/img/favicon.ico">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@3.1.8"></script>
	<link rel="preload" as="style" th:href="@{/css/app.9bcb1193.css}" />
	<link rel="modulepreload" th:href="@{/css/app.52792b88.js}" />
	<link rel="stylesheet" th:href="@{/css/app.9bcb1193.css}" />
	<script type="module" th:src="@{/js/app.52792b88.js}"></script>
</head>
